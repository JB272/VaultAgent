<!doctype html>
<html lang='de'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>VaultAgent</title>
    <link rel='stylesheet' href='/assets/website.css' />
    <script src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'></script>
  </head>
  <body>
    <div class='app-shell'>
      <header class='app-header'>
        <svg class='logo-icon' viewBox='0 0 24 24' width='22' height='22' fill='none' stroke='currentColor' stroke-width='2'>
          <path d='M12 2L2 7l10 5 10-5-10-5z'/><path d='M2 17l10 5 10-5'/><path d='M2 12l10 5 10-5'/>
        </svg>
        <div class='app-title'>VaultAgent</div>
        <nav class='tab-nav'>
          <button class='tab-btn active' data-tab='chat'>
            <svg viewBox='0 0 24 24' width='16' height='16' fill='none' stroke='currentColor' stroke-width='2'><path d='M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z'/></svg>
            Chat
          </button>
          <button class='tab-btn' data-tab='files'>
            <svg viewBox='0 0 24 24' width='16' height='16' fill='none' stroke='currentColor' stroke-width='2'><path d='M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z'/></svg>
            Files
          </button>
        </nav>
        <div class='header-spacer'></div>
        <div class='app-status' id='status-dot'>
          <span class='status-led'></span>
          online
        </div>
      </header>

      <!-- Chat Tab -->
      <div id='tab-chat' class='tab-content active'>
        <main id='messages' class='messages'>
          <div class='welcome-card'>
            <div class='welcome-icon'>
              <svg viewBox='0 0 24 24' width='32' height='32' fill='none' stroke='currentColor' stroke-width='1.5'><path d='M12 2L2 7l10 5 10-5-10-5z'/><path d='M2 17l10 5 10-5'/><path d='M2 12l10 5 10-5'/></svg>
            </div>
            <h2>VaultAgent Chat</h2>
            <p>Dein pers&ouml;nlicher AI-Assistent. Schreibe eine Nachricht, um zu beginnen.</p>
          </div>
        </main>
        <form id='composer' class='composer'>
          <input id='messageInput' autocomplete='off' placeholder='Nachricht schreiben...' />
          <button type='submit'>
            <svg viewBox='0 0 24 24' width='18' height='18' fill='none' stroke='currentColor' stroke-width='2'><line x1='22' y1='2' x2='11' y2='13'/><polygon points='22 2 15 22 11 13 2 9 22 2'/></svg>
          </button>
        </form>
      </div>

      <!-- Files Tab -->
      <div id='tab-files' class='tab-content'>
        <div class='files-container'>
          <div class='files-toolbar'>
            <div id='breadcrumb' class='breadcrumb'>
              <span class='crumb' data-path='.'>
                <svg viewBox='0 0 24 24' width='14' height='14' fill='none' stroke='currentColor' stroke-width='2'><path d='M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z'/></svg>
                workspace
              </span>
            </div>
            <div class='files-actions'>
              <button id='btn-new-file' class='toolbar-btn' title='Neue Datei'>
                <svg viewBox='0 0 24 24' width='14' height='14' fill='none' stroke='currentColor' stroke-width='2'><path d='M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z'/><polyline points='14 2 14 8 20 8'/><line x1='12' y1='18' x2='12' y2='12'/><line x1='9' y1='15' x2='15' y2='15'/></svg>
                Datei
              </button>
              <button id='btn-new-dir' class='toolbar-btn' title='Neuer Ordner'>
                <svg viewBox='0 0 24 24' width='14' height='14' fill='none' stroke='currentColor' stroke-width='2'><path d='M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z'/><line x1='12' y1='11' x2='12' y2='17'/><line x1='9' y1='14' x2='15' y2='14'/></svg>
                Ordner
              </button>
              <button id='btn-refresh' class='toolbar-btn icon-only' title='Aktualisieren'>
                <svg viewBox='0 0 24 24' width='14' height='14' fill='none' stroke='currentColor' stroke-width='2'><polyline points='23 4 23 10 17 10'/><path d='M20.49 15a9 9 0 11-2.12-9.36L23 10'/></svg>
              </button>
            </div>
          </div>

          <div id='file-browser' class='file-browser'>
            <div id='file-list' class='file-list'></div>
          </div>

          <div id='file-editor' class='file-editor hidden'>
            <div class='editor-header'>
              <button id='btn-back' class='toolbar-btn'>
                <svg viewBox='0 0 24 24' width='14' height='14' fill='none' stroke='currentColor' stroke-width='2'><polyline points='15 18 9 12 15 6'/></svg>
                Zur&uuml;ck
              </button>
              <span id='editor-filename' class='editor-filename'></span>
              <div class='editor-actions'>
                <button id='btn-save' class='toolbar-btn primary' title='Speichern (Ctrl+S)'>
                  <svg viewBox='0 0 24 24' width='14' height='14' fill='none' stroke='currentColor' stroke-width='2'><path d='M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z'/><polyline points='17 21 17 13 7 13 7 21'/><polyline points='7 3 7 8 15 8'/></svg>
                  Speichern
                </button>
                <button id='btn-rename-editor' class='toolbar-btn' title='Umbenennen'>
                  <svg viewBox='0 0 24 24' width='14' height='14' fill='none' stroke='currentColor' stroke-width='2'><path d='M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7'/><path d='M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z'/></svg>
                </button>
                <button id='btn-delete-editor' class='toolbar-btn danger' title='L&ouml;schen'>
                  <svg viewBox='0 0 24 24' width='14' height='14' fill='none' stroke='currentColor' stroke-width='2'><polyline points='3 6 5 6 21 6'/><path d='M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2'/></svg>
                </button>
              </div>
            </div>
            <textarea id='editor-content' class='editor-content' spellcheck='false'></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Context Menu -->
    <div id='context-menu' class='context-menu hidden'>
      <button class='ctx-item' data-action='open'>&#128194; &Ouml;ffnen</button>
      <button class='ctx-item' data-action='rename'>&#9998; Umbenennen</button>
      <button class='ctx-item' data-action='copy'>&#128203; Kopieren</button>
      <button class='ctx-item' data-action='delete'>&#128465; L&ouml;schen</button>
    </div>

    <script src='/assets/website.js'></script>
  </body>
</html>
