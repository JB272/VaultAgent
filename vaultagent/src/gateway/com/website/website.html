<!doctype html>
<html lang='de'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>VaultAgent Chat</title>
    <link rel='stylesheet' href='/assets/website.css' />
  </head>
  <body>
    <section class='chat-shell'>
      <header class='chat-header'>
        <div class='chat-title'>VaultAgent Gateway Chat</div>
        <div class='chat-status'>lokal verbunden</div>
      </header>
      <main id='messages' class='messages'>
        <div class='bubble system'>Schreibe eine Nachricht, um sie als IncomingAction ans Gateway zu senden.</div>
      </main>
      <form id='composer' class='composer'>
        <input id='messageInput' autocomplete='off' placeholder='Nachricht an das Gateway...' />
        <button type='submit'>Senden</button>
      </form>
    </section>

    <script>
      const messagesEl = document.getElementById('messages');
      const composerEl = document.getElementById('composer');
      const inputEl = document.getElementById('messageInput');

      function addBubble(message) {
        const bubble = document.createElement('div');
        const sourceClass = message.source === 'you'
          ? 'you'
          : (message.source === 'assistant' ? 'assistant' : 'system');
        bubble.className = `bubble ${sourceClass}`;
        bubble.textContent = message.text;
        messagesEl.appendChild(bubble);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function addTypingBubble() {
        const bubble = document.createElement('div');
        bubble.className = 'bubble system typing';
        bubble.textContent = 'Assistant schreibt ...';
        messagesEl.appendChild(bubble);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function refreshMessages() {
        const response = await fetch('/api/messages');
        if (!response.ok) return;
        const data = await response.json();

        while (messagesEl.lastChild) messagesEl.removeChild(messagesEl.lastChild);
        addBubble({ text: 'Schreibe eine Nachricht, um sie als IncomingAction ans Gateway zu senden.', source: 'system' });
        data.messages.forEach(addBubble);
        if (data.assistant_stream_text) {
          addBubble({ text: data.assistant_stream_text, source: 'assistant' });
        }
        if (data.assistant_typing && !data.assistant_stream_text) addTypingBubble();
      }

      composerEl.addEventListener('submit', async (event) => {
        event.preventDefault();
        const text = inputEl.value.trim();
        if (!text) return;

        const response = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        if (response.ok) {
          inputEl.value = '';
          await refreshMessages();
        }
      });

      setInterval(refreshMessages, 300);
      refreshMessages();
    </script>
  </body>
</html>
