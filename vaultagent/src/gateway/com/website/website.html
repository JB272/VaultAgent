<!doctype html>
<html lang='de'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>VaultAgent</title>
    <link rel='stylesheet' href='/assets/website.css' />
    <script src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'></script>
  </head>
  <body>
    <div class='app-shell'>
      <header class='app-header'>
        <div class='app-title'>VaultAgent</div>
        <nav class='tab-nav'>
          <button class='tab-btn active' data-tab='chat'>Chat</button>
          <button class='tab-btn' data-tab='files'>Files</button>
        </nav>
        <div class='app-status' id='status-dot'>verbunden</div>
      </header>

      <!-- Chat Tab -->
      <div id='tab-chat' class='tab-content active'>
        <main id='messages' class='messages'>
          <div class='bubble system'>Schreibe eine Nachricht, um zu beginnen.</div>
        </main>
        <form id='composer' class='composer'>
          <input id='messageInput' autocomplete='off' placeholder='Nachricht...' />
          <button type='submit'>Senden</button>
        </form>
      </div>

      <!-- Files Tab -->
      <div id='tab-files' class='tab-content'>
        <div class='files-container'>
          <div class='files-toolbar'>
            <div id='breadcrumb' class='breadcrumb'>
              <span class='crumb' data-path='.'>workspace</span>
            </div>
            <div class='files-actions'>
              <button id='btn-new-file' class='toolbar-btn'>+ Datei</button>
              <button id='btn-new-dir' class='toolbar-btn'>+ Ordner</button>
              <button id='btn-refresh' class='toolbar-btn'>&#8635;</button>
            </div>
          </div>

          <div id='file-browser' class='file-browser'>
            <div id='file-list' class='file-list'></div>
          </div>

          <div id='file-editor' class='file-editor hidden'>
            <div class='editor-header'>
              <button id='btn-back' class='toolbar-btn'>&larr; Zur&uuml;ck</button>
              <span id='editor-filename' class='editor-filename'></span>
              <div class='editor-actions'>
                <button id='btn-save' class='toolbar-btn primary'>Speichern</button>
                <button id='btn-delete' class='toolbar-btn danger'>L&ouml;schen</button>
              </div>
            </div>
            <textarea id='editor-content' class='editor-content' spellcheck='false'></textarea>
          </div>
        </div>
      </div>
    </div>

    <script src='/assets/website.js'></script>
  </body>
</html>
