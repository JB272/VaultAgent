# VaultAgent — Sandbox Worker
#
# The host orchestrator (systemd) talks to this container over HTTP.
# All skill/tool execution happens inside the container.
# LLM keys and Telegram tokens NEVER enter this container.
#
# Usage:
#   docker compose up -d          # start worker
#   docker compose logs -f        # view logs
#   docker compose down           # stop worker
#   docker compose build          # rebuild image after binary update

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: vaultagent-worker
    restart: unless-stopped

    # ── User ──────────────────────────────────────────
    # Run as UID 1000 (matching the host user) via the Dockerfile USER directive.
    # Do NOT override with user: here — sudo needs /etc/sudoers inside the image.

    # ── Volumes ───────────────────────────────────────
    # Isolated runtime workspace (Docker-managed volume).
    # Files created/read by tools live only inside Docker, not on the host FS.
    volumes:
      - worker_workspace:/workspace
      # Keep cron/soul shared with host so scheduler + memory stay in sync.
      - ./cron:/host_cron
      - ./soul:/host_soul
      # Also expose them as relative paths so the web file browser can list them.
      - ./soul:/workspace/soul
      - ./cron:/workspace/cron

    # ── Environment ───────────────────────────────────
    env_file: .env.docker
    environment:
      MAILBOX_EMAIL_ADDRESS: ${MAILBOX_EMAIL_ADDRESS:-}
      MAILBOX_EMAIL_PASSWORD: ${MAILBOX_EMAIL_PASSWORD:-}
      MAILBOX_IMAP_HOST: ${MAILBOX_IMAP_HOST:-}
      MAILBOX_IMAP_PORT: ${MAILBOX_IMAP_PORT:-993}
      MAILBOX_POP3_HOST: ${MAILBOX_POP3_HOST:-}
      MAILBOX_POP3_PORT: ${MAILBOX_POP3_PORT:-995}
      MAILBOX_SMTP_HOST: ${MAILBOX_SMTP_HOST:-}
      MAILBOX_SMTP_PORT: ${MAILBOX_SMTP_PORT:-587}

    # ── Network ───────────────────────────────────────
    # Only expose on localhost — the host orchestrator connects here.
    ports:
      - "127.0.0.1:9100:9100"

    # ── Security hardening ────────────────────────────
    # The root filesystem is writable so the worker can install packages
    # (e.g. sudo apt-get install git). The container is still isolated by
    # resource limits and network scoping to localhost.
    # Note: no-new-privileges and cap_drop ALL are removed because sudo
    # needs setuid to escalate to root for package installation.

    # ── Resource limits ───────────────────────────────
    mem_limit: 512m
    pids_limit: 100

volumes:
  worker_workspace:
