# VaultAgent — Sandbox Worker
#
# The host orchestrator (systemd) talks to this container over HTTP.
# All skill/tool execution happens inside the container.
# LLM keys and Telegram tokens NEVER enter this container.
#
# Usage:
#   docker compose up -d          # start worker
#   docker compose logs -f        # view logs
#   docker compose down           # stop worker
#   docker compose build          # rebuild image after binary update

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: vaultagent-worker
    restart: unless-stopped

    # ── User ──────────────────────────────────────────
    # Run as UID 1000 (matching the host user) via the Dockerfile USER directive.
    # Do NOT override with user: here — sudo needs /etc/sudoers inside the image.

    # ── Volumes ───────────────────────────────────────
    # Mount workspace directories into the container.
    # The worker can read and write these freely.
    volumes:
      - ./soul:/workspace/soul
      - ./skills:/workspace/skills
      - ./cron:/workspace/cron

    # ── Environment ───────────────────────────────────
    env_file: .env.docker

    # ── Network ───────────────────────────────────────
    # Only expose on localhost — the host orchestrator connects here.
    ports:
      - "127.0.0.1:9100:9100"

    # ── Security hardening ────────────────────────────
    # The root filesystem is writable so the worker can install packages
    # (e.g. sudo apt-get install git). The container is still isolated by
    # resource limits and network scoping to localhost.
    # Note: no-new-privileges and cap_drop ALL are removed because sudo
    # needs setuid to escalate to root for package installation.

    # ── Resource limits ───────────────────────────────
    mem_limit: 512m
    pids_limit: 100
