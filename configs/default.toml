[runner]
max_steps = 24
max_tool_calls = 40
max_output_tokens = 4096
max_total_tokens = 120000
max_retries_per_step = 2
step_timeout_seconds = 30

[security]
workspace_root = "."
allow_network = false
allow_shell = false
max_file_size_bytes = 1048576

[network]
allowlist_domains = []
timeout_seconds = 10
max_response_bytes = 1048576

[routing]
default_model = "local-small"
upgrade_model = "local-large"

[audit]
runs_dir = "runs"
redact_secrets = true
